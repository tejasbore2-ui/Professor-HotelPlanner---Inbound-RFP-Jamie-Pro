<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Mock Trainer</title>
  <script src="https://elevenlabs.io/convai-widget/index.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; color: #fff; overflow: hidden; position: relative; }
    .bg-blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.2; animation: floatBlob linear infinite; pointer-events: none; z-index: 0; }
    .blob1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -150px; animation-duration: 18s; }
    .blob2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -120px; right: -100px; animation-duration: 22s; animation-delay: -8s; }
    .blob3 { width: 280px; height: 280px; background: #06b6d4; top: 40%; left: 55%; animation-duration: 26s; animation-delay: -4s; }
    @keyframes floatBlob {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }
    h1, .subtitle, .start-btn, .session-box { position: relative; z-index: 1; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; text-align: center; color: #fff; }
    .subtitle { font-size: 1rem; color: #aaa; margin-bottom: 40px; text-align: center; }
    .start-btn { background: #2563eb; color: white; border: none; padding: 16px 40px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-bottom: 30px; }
    .start-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
    .session-box { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 30px 40px; text-align: center; max-width: 480px; width: 100%; box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
    .session-box h2 { font-size: 1.2rem; margin-bottom: 10px; color: #fff; }
    .session-box p { font-size: 0.9rem; color: #888; margin-bottom: 24px; }
    elevenlabs-convai { display: none; }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>
  <h1>Sales Mock Trainer</h1>
  <p class="subtitle">Practice a real voice-based mock sales pitch powered by AI.</p>
  <button class="start-btn" onclick="startCall()">🎙️ Start Mock Call</button>
  <div class="session-box">
    <h2>Mock Call Session</h2>
    <p>Your microphone will activate automatically when the call starts.</p>
    <button class="start-btn" style="background:#dc2626; margin-bottom:0;" onclick="endCall()">End Call</button>
  </div>
  <elevenlabs-convai id="convai-widget" agent-id="agent_6101ktwb58qxedmt9n2pjfrc41yy"></elevenlabs-convai>
  <script>
    function startCall() { const w = document.getElementById('convai-widget'); w.style.display = 'block'; w.shadowRoot?.querySelector('button')?.click(); }
    function endCall() { document.getElementById('convai-widget').style.display = 'none'; alert('Call ended. Recording saved to your ElevenLabs dashboard.'); }
  </script>
</body>
</html>
